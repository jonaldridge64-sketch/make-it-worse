<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make It Worse Method</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0E0E0E;
    --text: #E8E6E0;
    --muted: #666660;
    --dim: #333330;
    --font: 'IBM Plex Mono', 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .outer {
    width: 100%;
    max-width: 520px;
  }

  header {
    margin-bottom: 3rem;
  }

  header h1 {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .content { animation: fadeUp 0.25s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-tag {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: block;
  }

  .prompt {
    font-size: 22px;
    font-weight: 300;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  .sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .note {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .actions {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 2.5rem;
  }

  .btn-next {
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 11px 18px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }

  .btn-next:hover { opacity: 0.8; }
  .btn-next:active { opacity: 0.6; }

  .btn-reset {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 11px 0;
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: color 0.15s;
  }

  .btn-reset:hover { color: var(--text); }

  .examples {
    border-top: 1px solid var(--dim);
    padding-top: 1.5rem;
  }

  .examples-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .example {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 12px;
    margin-bottom: 0.85rem;
  }

  .example:last-child { margin-bottom: 0; }

  .brand {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding-top: 2px;
  }

  .line {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
    font-weight: 300;
  }

  .dots {
    display: flex;
    gap: 8px;
    margin-top: 2.5rem;
  }

  .dot {
    width: 4px;
    height: 4px;
    background: var(--dim);
    transition: background 0.2s;
  }

  .dot.active { background: var(--text); }

  footer {
    margin-top: 3rem;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="outer">
  <header>
    <h1>Make It Worse Method</h1>
  </header>

  <div id="content" class="content"></div>

  <div class="dots" id="dots"></div>

  <footer>
    <p>As used on Life360's <em>I Think of You Dying</em> — 4 D&amp;AD Pencils.</p>
  </footer>
</div>

<script>
const steps = [
  {
    tag: "",
    prompt: "Start with what the client wants to say.",
    sub: "It's usually right there in the brief. Probably true. Almost certainly boring.",
    note: "",
    examples: [
      { brand: "Trolli",  line: "A candy that makes people happy." },
      { brand: "Life360", line: "An app that gives moms peace of mind." },
      { brand: "Crest",   line: "A toothpaste that whitens your teeth." },
    ],
    btn: "Step 1: Make it feel true →"
  },
  {
    tag: "Step 1",
    prompt: "Translate it into a version you actually believe. Be more honest. Include the negative bits.",
    sub: "",
    note: "Now it feels real. Still not funny.",
    examples: [
      { brand: "Trolli",  line: "Candy makes you happy for about 6 seconds. Then baseline sadness returns." },
      { brand: "Life360", line: "Loving someone means worrying about them constantly." },
      { brand: "Crest",   line: "You can charm anyone with a smile." },
    ],
    btn: "Step 2: Make it sound bad →"
  },
  {
    tag: "Step 2",
    prompt: "Take that truth and say it in the most unhelpful, slightly evil way you can.",
    sub: "",
    note: "Now you have something true, funny, and buildable.",
    examples: [
      { brand: "Trolli",  line: "A candy that forces people to be temporarily happy." },
      { brand: "Life360", line: "An app that helps moms stop imagining every possible way their kid could die." },
      { brand: "Crest",   line: "You can get away with anything if you smile." },
    ],
    btn: "See what it unlocks →"
  },
  {
    tag: "Step 3",
    prompt: "Your slightly evil truth is now a campaign territory. It still answers the brief. It still sells the product. But it makes you laugh.",
    sub: "",
    note: "That's the brief solved.",
    examples: [
      { brand: "Trolli",  line: "Grumpy troll is forced against his will to be happy while he eats candy." },
      { brand: "Life360", line: "Mom sings a murder ballad about all the things that could happen to her daughter." },
      { brand: "Crest",   line: "People getting away with horrible things because they smile nicely." },
    ],
    btn: "Run it again →"
  }
];

let current = 0;

function render() {
  const content = document.getElementById('content');
  const dots    = document.getElementById('dots');
  const step    = steps[current];

  const exHtml = step.examples.map(e =>
    `<div class="example">
      <span class="brand">${e.brand}</span>
      <span class="line">${e.line}</span>
    </div>`
  ).join('');

  const resetBtn = current > 0
    ? `<button class="btn-reset" onclick="reset()">Start over</button>`
    : '';

  content.innerHTML = `
    ${step.tag ? `<span class="step-tag">${step.tag}</span>` : ''}
    <p class="prompt">${step.prompt}</p>
    ${step.sub ? `<p class="sub">${step.sub}</p>` : ''}
    ${step.note ? `<p class="note">${step.note}</p>` : ''}
    <div class="actions">
      <button class="btn-next" onclick="advance()">${step.btn}</button>
      ${resetBtn}
    </div>
    <div class="examples">
      <p class="examples-label">Examples</p>
      ${exHtml}
    </div>
  `;

  content.classList.remove('content');
  void content.offsetWidth;
  content.classList.add('content');

  dots.innerHTML = steps.map((_, i) =>
    `<div class="dot${i === current ? ' active' : ''}"></div>`
  ).join('');
}

function advance() {
  current = current < steps.length - 1 ? current + 1 : 0;
  render();
}

function reset() {
  current = 0;
  render();
}

render();
</script>
</body>
</html>
